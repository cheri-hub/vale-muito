# Example only. Do not overwrite existing Nginx files blindly.
# Copy this into a new site file after choosing the final domain:
#   sudo nano /etc/nginx/sites-available/valemuito.conf
#   sudo ln -s /etc/nginx/sites-available/valemuito.conf /etc/nginx/sites-enabled/valemuito.conf
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Optional http{}-level defense-in-depth, configured once outside this server block:
#   limit_req_zone $binary_remote_addr zone=valemuito_http:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name vale-muito.cherihub.cloud;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vale-muito.cherihub.cloud;

    # Use certbot or your existing certificate workflow to create these files.
    ssl_certificate /etc/letsencrypt/live/vale-muito.cherihub.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vale-muito.cherihub.cloud/privkey.pem;

    client_max_body_size 8m;

    location / {
        # Uncomment only if the http{} limit_req_zone above exists.
        # limit_req zone=valemuito_http burst=30 nodelay;

        proxy_pass http://127.0.0.1:3008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
